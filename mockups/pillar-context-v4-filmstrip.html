<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>V4 Filmstrip — pillar context</title>
  <link rel="stylesheet" href="pillar-context-base.css"/>
  <style>
    .zone {
      position: absolute;
      left: 50%; top: 44%;
      transform: translate(-50%, -50%);
      width: min(880px, 94%);
      min-height: 400px;
      border-radius: 10px;
      border: 2px solid var(--zone-color);
      background: rgba(1, 10, 24, 0.75);
      box-shadow: 0 0 40px color-mix(in srgb, var(--zone-color) 20%, transparent);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .zone-head {
      padding: 14px 18px 10px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .zone-head h2 {
      font-size: 0.9rem;
      color: var(--title-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .zone-head h2 img { width: 22px; filter: brightness(0) invert(1); }
    .zone-head .promise {
      margin-top: 6px;
      font-size: 0.68rem;
      font-weight: 600;
      color: #cbd5e1;
    }
    .zone-graph {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-content: center;
      justify-content: center;
      padding: 24px 20px 80px;
    }
    .zone-graph .fam {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--zone-color) 30%, transparent);
      border: 2px solid rgba(255,255,255,.22);
      font-size: 0.52rem;
      font-weight: 700;
      display: grid;
      place-items: center;
    }

    .filmstrip-wrap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 0 0 8px;
      background: linear-gradient(0deg, rgba(1,8,20,.98) 60%, transparent);
    }
    .filmstrip-wrap::before {
      content: "Value props";
      display: block;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--subtle);
      padding: 8px 16px 4px;
    }
    .filmstrip {
      display: flex;
      gap: 10px;
      padding: 4px 16px 10px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    .filmstrip::-webkit-scrollbar { display: none; }
    .filmstrip.auto-scroll {
      animation: scrollStrip 28s linear infinite;
    }
    .filmstrip-wrap:hover .filmstrip.auto-scroll { animation-play-state: paused; }
    @keyframes scrollStrip {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .strip-card {
      flex: 0 0 200px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      cursor: pointer;
      transition: transform .2s, border-color .2s, background .2s;
    }
    .strip-card:hover, .strip-card.expanded {
      border-color: color-mix(in srgb, var(--zone-color) 50%, transparent);
      background: color-mix(in srgb, var(--zone-color) 8%, rgba(255,255,255,.04));
    }
    .strip-card h4 {
      font-size: 0.68rem;
      color: #e2e8f0;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .strip-card p {
      font-size: 0.6rem;
      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .strip-card.expanded {
      flex: 0 0 280px;
    }
    .strip-card.expanded p { -webkit-line-clamp: unset; }

    .lift-panel {
      position: absolute;
      left: 50%;
      bottom: 118px;
      transform: translateX(-50%) translateY(12px);
      width: min(360px, 88%);
      padding: 14px 16px;
      border-radius: 10px;
      background: rgba(6, 14, 28, 0.96);
      border: 1px solid color-mix(in srgb, var(--zone-color) 45%, transparent);
      box-shadow: 0 -8px 40px rgba(0,0,0,.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 5;
    }
    .lift-panel.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    .lift-panel kbd {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--zone-color);
      text-transform: uppercase;
    }
    .lift-panel h3 { font-size: 0.78rem; color: #e2e8f0; margin: 4px 0 8px; }
    .lift-panel p { font-size: 0.68rem; color: var(--muted); line-height: 1.5; }
    .lift-panel button {
      position: absolute;
      top: 8px; right: 8px;
      border: none;
      background: transparent;
      color: var(--subtle);
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="mockup-shell">
    <p class="back"><a href="pillar-context-gallery.html">← All versions</a></p>
    <p class="pitch">Ambient filmstrip along the zone bottom — auto-scrolls, pauses on hover, click lifts full detail without covering the graph.</p>
    <div class="controls"></div>
    <div class="chrome">
      <div class="topbar"></div>
      <div class="actionbar"></div>
      <div class="canvas-wrap" style="min-height:540px">
        <div class="zone">
          <header class="zone-head">
            <h2><img id="icon" src="" alt=""/><span id="title"></span></h2>
            <p class="promise" id="promise"></p>
          </header>
          <div class="zone-graph" id="graph"></div>
          <div class="lift-panel" id="lift">
            <button type="button" id="closeLift">×</button>
            <kbd id="liftKbd"></kbd>
            <h3 id="liftTitle"></h3>
            <p id="liftBody"></p>
          </div>
          <div class="filmstrip-wrap">
            <div class="filmstrip auto-scroll" id="strip"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="pillar-context-data.js"></script>
  <script src="pillar-context-chrome.js"></script>
  <script>
    let pillarId = "ai-dc";
    const lift = document.getElementById("lift");

    function render() {
      const p = PILLAR_CTX[pillarId];
      document.documentElement.style.setProperty("--zone-color", p.color);
      document.getElementById("icon").src = p.icon;
      document.getElementById("title").textContent = p.label;
      document.getElementById("promise").textContent = p.promise;
      document.getElementById("graph").innerHTML = p.families.map(f =>
        `<span class="fam" title="${f.label}">${f.abbr}</span>`).join("");

      const cards = [...p.highlights, ...p.highlights];
      const strip = document.getElementById("strip");
      strip.classList.remove("auto-scroll");
      strip.innerHTML = cards.map((h, i) => `
        <article class="strip-card" data-i="${i % p.highlights.length}">
          <h4>${h.title}</h4>
          <p>${h.body}</p>
        </article>`).join("");
      void strip.offsetWidth;
      strip.classList.add("auto-scroll");
      lift.classList.remove("show");
    }

    document.getElementById("strip").addEventListener("click", e => {
      const c = e.target.closest(".strip-card");
      if (!c) return;
      const p = PILLAR_CTX[pillarId];
      const i = +c.dataset.i;
      const h = p.highlights[i];
      document.getElementById("liftKbd").textContent = `Value prop ${i + 1}`;
      document.getElementById("liftTitle").textContent = h.title;
      document.getElementById("liftBody").textContent = h.body;
      lift.classList.add("show");
      document.getElementById("strip").classList.remove("auto-scroll");
    });

    document.getElementById("closeLift").onclick = () => {
      lift.classList.remove("show");
      document.getElementById("strip").classList.add("auto-scroll");
    };

    initPillarMockup({ onPillar: id => { pillarId = id; render(); } });
    render();
  </script>
</body>
</html>
