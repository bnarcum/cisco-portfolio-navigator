<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="cpn-lens" cx="46%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="18%" stop-color="#d8f8ff"/>
      <stop offset="42%" stop-color="#02c8ff"/>
      <stop offset="78%" stop-color="#0a60ff"/>
      <stop offset="100%" stop-color="#063878"/>
    </radialGradient>
    <linearGradient id="cpn-silver" x1="16" y1="10" x2="84" y2="90">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="28%" stop-color="#d4ecf8"/>
      <stop offset="55%" stop-color="#88c4e4"/>
      <stop offset="100%" stop-color="#2e75b6"/>
    </linearGradient>
    <linearGradient id="cpn-silverDark" x1="84" y1="14" x2="16" y2="86">
      <stop offset="0%" stop-color="#1a3a58"/>
      <stop offset="50%" stop-color="#2e75b6"/>
      <stop offset="100%" stop-color="#6aaed4"/>
    </linearGradient>
    <linearGradient id="cpn-gold" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#f0e0b8"/>
      <stop offset="35%" stop-color="#c8a060"/>
      <stop offset="70%" stop-color="#e8d8b0"/>
      <stop offset="100%" stop-color="#a07840"/>
    </linearGradient>
    <linearGradient id="cpn-goldEdge" x1="50" y1="0" x2="50" y2="100">
      <stop offset="0%" stop-color="#fff4dc"/>
      <stop offset="50%" stop-color="#d4b070"/>
      <stop offset="100%" stop-color="#8a6830"/>
    </linearGradient>
    <radialGradient id="cpn-halo" cx="50%" cy="50%" r="54%">
      <stop offset="52%" stop-color="#02c8ff" stop-opacity="0"/>
      <stop offset="82%" stop-color="#02c8ff" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#02c8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cpn-glow"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cpn-core"><feGaussianBlur stdDeviation="3.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cpn-soft"><feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cpn-orbit"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <circle cx="50" cy="50" r="47" fill="url(#cpn-halo)"/>

  <!-- outer gold instrument ring -->
  <circle cx="50" cy="50" r="44.5" stroke="url(#cpn-gold)" stroke-width="1.8" opacity=".92"/>
  <circle cx="50" cy="50" r="41" stroke="url(#cpn-silver)" stroke-width=".7" opacity=".55"/>

  <!-- fine degree ticks (subtle, not dial-heavy) -->
  <g stroke="#e8d4a8" stroke-width=".55" opacity=".62" stroke-linecap="round">
    <g transform="rotate(0 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(15 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(30 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(45 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(60 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(75 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(90 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(105 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(120 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(135 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(150 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(165 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(180 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(195 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(210 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(225 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(240 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(255 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(270 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(285 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(300 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(315 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
    <g transform="rotate(330 50 50)"><line x1="50" y1="6.5" x2="50" y2="9.5"/></g>
    <g transform="rotate(345 50 50)"><line x1="50" y1="6.5" x2="50" y2="8.8"/></g>
  </g>

  <!-- elliptical orbital paths -->
  <g filter="url(#cpn-orbit)" opacity=".55">
    <ellipse cx="50" cy="50" rx="34" ry="22" stroke="#02c8ff" stroke-width=".9" transform="rotate(-18 50 50)"/>
    <ellipse cx="50" cy="50" rx="34" ry="22" stroke="#ff9000" stroke-width=".9" transform="rotate(52 50 50)"/>
    <ellipse cx="50" cy="50" rx="34" ry="22" stroke="#70ad47" stroke-width=".8" transform="rotate(128 50 50)"/>
  </g>

  <!-- inner radar rings -->
  <circle cx="50" cy="50" r="32" stroke="#58acd8" stroke-width=".75" opacity=".38"/>
  <circle cx="50" cy="50" r="24" stroke="#58acd8" stroke-width=".8" opacity=".48"/>
  <circle cx="50" cy="50" r="16" stroke="#58acd8" stroke-width=".82" opacity=".58"/>

  <!-- sculptural 8-point star with gold edge highlights -->
  <g filter="url(#cpn-glow)">
    <path fill="url(#cpn-silver)" stroke="url(#cpn-goldEdge)" stroke-width=".35" d="M50 9 L56.5 36 L50 31.5 L43.5 36 Z"/>
    <path fill="url(#cpn-silverDark)" stroke="url(#cpn-goldEdge)" stroke-width=".3" d="M50 91 L56.5 64 L50 68.5 L43.5 64 Z"/>
    <path fill="url(#cpn-silver)" stroke="url(#cpn-goldEdge)" stroke-width=".35" d="M9 50 L36 43.5 L31.5 50 L36 56.5 Z"/>
    <path fill="url(#cpn-silverDark)" stroke="url(#cpn-goldEdge)" stroke-width=".3" d="M91 50 L64 43.5 L68.5 50 L64 56.5 Z"/>
    <path fill="url(#cpn-silver)" stroke="url(#cpn-goldEdge)" stroke-width=".3" opacity=".95" d="M20 20 L40 38 L36 42 L18 24 Z"/>
    <path fill="url(#cpn-silverDark)" stroke="url(#cpn-goldEdge)" stroke-width=".28" opacity=".95" d="M80 80 L60 62 L64 58 L82 76 Z"/>
    <path fill="url(#cpn-silverDark)" stroke="url(#cpn-goldEdge)" stroke-width=".3" opacity=".95" d="M80 20 L62 38 L58 34 L76 16 Z"/>
    <path fill="url(#cpn-silver)" stroke="url(#cpn-goldEdge)" stroke-width=".28" opacity=".95" d="M20 80 L38 62 L42 66 L24 84 Z"/>
  </g>

  <!-- lens aperture center -->
  <g filter="url(#cpn-core)">
    <circle cx="50" cy="50" r="14" fill="#02c8ff" opacity=".1"/>
    <circle cx="50" cy="50" r="11" stroke="#58acd8" stroke-width=".7" opacity=".5"/>
    <circle cx="50" cy="50" r="8.5" stroke="#88d8f8" stroke-width=".55" opacity=".65"/>
    <circle cx="50" cy="50" r="6" stroke="#b8ecff" stroke-width=".45" opacity=".75"/>
    <circle cx="50" cy="50" r="4.8" fill="url(#cpn-lens)"/>
    <circle cx="47" cy="46.5" r="2.2" fill="#fff" opacity=".82"/>
    <ellipse cx="51.5" cy="52" rx="1.4" ry=".9" fill="#fff" opacity=".28"/>
  </g>

  <!-- orbital nodes on paths -->
  <g filter="url(#cpn-soft)">
    <circle cx="76" cy="22" r="5.4" fill="#ff9000"/>
    <circle cx="77" cy="72" r="5" fill="#ff9000" opacity=".85"/>
    <circle cx="26" cy="76" r="5.4" fill="#70ad47"/>
    <circle cx="24" cy="26" r="4.6" fill="#02c8ff" opacity=".9"/>
  </g>
</svg>
