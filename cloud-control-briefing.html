<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#090b11"/>
  <title>Cisco AI Canvas · Cloud Control (Demo)</title>
  <link rel="icon" type="image/svg+xml" href="assets/cpn-favicon.svg"/>
  <link rel="stylesheet" href="assets/cpn-cloud-control-briefing.css?v=2.96.0"/>
</head>
<body>
  <!-- ── Top product nav ─────────────────────────────────────────────── -->
  <header class="cc-nav">
    <div class="cc-nav-l">
      <div class="cc-logo">
        <img src="assets/cpn-logo.svg" alt="" decoding="async"/>
        <div><span class="cc-cisco">cisco</span><b>Cloud Control</b></div>
      </div>
      <div class="cc-acct" id="cc-acct"><span>Wayne Enterprise</span><span class="cc-caret">▾</span></div>
      <button class="cc-apps" title="Apps" aria-label="Apps">▦</button>
      <nav class="cc-tabs" id="cc-tabs"></nav>
    </div>
    <div class="cc-nav-r">
      <button class="cc-icobtn" aria-label="Help">?</button>
      <button class="cc-icobtn" aria-label="Notifications">◔</button>
      <div class="cc-user">◍</div>
    </div>
  </header>

  <!-- ── Sub toolbar ─────────────────────────────────────────────────── -->
  <div class="cc-sub">
    <div class="cc-modes">
      <div class="cc-mode"><span class="cc-ico">✦</span> Assistant</div>
      <div class="cc-mode is-active"><span class="cc-ico">▦</span> Canvas</div>
      <div class="cc-mode"><span class="cc-ico">⚙</span> Actions <span class="cc-caret" style="font-size:9px;color:var(--mut)">▾</span></div>
    </div>
    <div class="cc-sub-r">
      <div class="cc-dash" id="cc-dash"><span id="cc-dash-name">Network Health Dashboard</span><span class="cc-caret">▾</span></div>
      <div class="cc-collab" id="cc-collab"></div>
      <button class="cc-share">Share <span style="font-size:9px">▾</span></button>
      <button class="cc-more" aria-label="More">⋯</button>
    </div>
  </div>

  <!-- ── Shell ───────────────────────────────────────────────────────── -->
  <div class="cc-shell">
    <!-- Assistant conversation -->
    <aside class="cc-assist">
      <div class="cc-assist-top">
        <button class="cc-icobtn" aria-label="Menu">≡</button>
        <div class="cc-assist-actions">
          <button class="cc-icobtn" aria-label="Layout">▤</button>
          <button class="cc-icobtn" aria-label="Options">▾</button>
        </div>
      </div>
      <div class="cc-thread cc-scroll" id="cc-thread"></div>
      <div class="cc-composer-wrap">
        <form class="cc-composer" id="cc-composer" autocomplete="off">
          <div class="cc-composer-row">
            <span class="cc-plus">＋</span>
            <input id="cc-input" type="text" placeholder="Ask anything, / for prompts, # for knowledge" aria-label="Ask anything"/>
          </div>
          <div class="cc-composer-foot">
            <span class="cc-model">Default <span style="font-size:9px">▾</span></span>
            <button type="submit" class="cc-send" aria-label="Send">➤</button>
          </div>
        </form>
        <div class="cc-disclaim">Assistant can make mistakes. Verify responses. <a href="#" onclick="return false">Learn how the AI Assistant handles data</a> — demo, not live telemetry.</div>
      </div>
    </aside>

    <!-- Generative canvas board -->
    <main class="cc-canvas cc-scroll">
      <div class="cc-board" id="cc-board"></div>
    </main>

    <!-- Right tool strip -->
    <nav class="cc-tools">
      <button class="cc-tool" title="Add widget">＋</button>
      <button class="cc-tool" title="Layers">▦</button>
      <button class="cc-tool" title="Image">▣</button>
      <button class="cc-tool" title="Annotate">✎</button>
      <button class="cc-tool" title="Save">◫</button>
      <button class="cc-tool" title="Notes">▤</button>
      <button class="cc-tool" title="History">↺</button>
      <button class="cc-tool is-active" title="Board library">▨</button>
      <div class="cc-tools-sp"></div>
      <button class="cc-tool" title="Collapse">⇥</button>
    </nav>
  </div>

  <!-- Minimap + zoom -->
  <div class="cc-minimap" aria-hidden="true">
    <div class="cc-minimap-grid">
      <div class="cc-minimap-col">
        <div class="cc-mm" style="height:22%;background:#2dd4bf"></div>
        <div class="cc-mm" style="height:34%;background:#34d399"></div>
        <div class="cc-mm" style="height:30%;background:#6b8cff"></div>
      </div>
      <div class="cc-minimap-col">
        <div class="cc-mm" style="height:26%;background:#34d399"></div>
        <div class="cc-mm" style="height:24%;background:#2dd4bf"></div>
        <div class="cc-mm" style="height:32%;background:#f472b6"></div>
      </div>
    </div>
  </div>
  <div class="cc-zoom"><button aria-label="Zoom out">−</button><span>70%</span><button aria-label="Zoom in">＋</button></div>

  <button class="cc-back" id="cc-back" type="button">← Back to Portfolio Navigator</button>
  <div class="cc-boardmenu" id="cc-boardmenu"></div>

  <script src="assets/cpn-cloud-control-ops.js?v=2.96.0"></script>
  <script src="assets/cpn-cloud-control-briefing.js?v=2.96.0"></script>
</body>
</html>
